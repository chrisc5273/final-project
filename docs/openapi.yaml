      security:
        - bearerAuth: []
      responses:
        '200':
          description: Checklist item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
