components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthSignUp:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          example: StrongPassword123!
        role:
          type: string
          enum:
            - PORTER
            - MANAGER
            - ADMIN
            - USER
          example: PORTER
    AuthLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          example: StrongPassword123!
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        phonenumber:
          type: string
          nullable: true
          example: 555-0123
        role:
          type: string
          example: PORTER
        schedule:
          type: object
          additionalProperties:
            type: string
          example:
            monday: 08:00-16:00
            tuesday: 08:00-16:00
    UserCreate:
      allOf:
        - $ref: '#/components/schemas/User'
      required:
        - name
        - email
        - password
      properties:
        password:
          type: string
          format: password
          example: StrongPassword123!
    UserUpdate:
      type: object
      properties:
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane.updated@example.com
        password:
          type: string
          format: password
          example: NewPassword456!
        phonenumber:
          type: string
          example: 555-0456
        role:
          type: string
          enum:
            - PORTER
            - MANAGER
            - ADMIN
            - USER
          example: MANAGER
    Property:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Downtown Residence
        address:
          type: string
          example: 100 Main Street, Unit 5
        starttime:
          type: string
          nullable: true
          example: 08:00
    PropertyCreate:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          example: Downtown Residence
        address:
          type: string
          example: 100 Main Street, Unit 5
        starttime:
          type: string
          example: 08:00
    ChecklistItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        propertyid:
          type: integer
          example: 1
        taskdescription:
          type: string
          example: Vacuum the lobby
        isactive:
          type: boolean
          example: true
    ChecklistItemCreate:
      type: object
      required:
        - propertyid
        - taskdescription
      properties:
        propertyid:
          type: integer
          example: 1
        taskdescription:
          type: string
          example: Vacuum the lobby
        isactive:
          type: boolean
          example: true
    ChecklistSubmission:
      type: object
      properties:
        id:
          type: integer
          example: 1
        timesheetid:
          type: integer
          example: 1
        checklistitemid:
          type: integer
          example: 1
        photourl:
          type: string
          example: https://example.com/photos/submission-1.jpg
        completedat:
          type: string
          format: date-time
          example: 2026-05-01T09:15:00.000Z
    ChecklistSubmissionCreate:
      type: object
      required:
        - timesheetid
        - checklistitemid
        - photourl
        - completedat
      properties:
        timesheetid:
          type: integer
          example: 1
        checklistitemid:
          type: integer
          example: 1
        photourl:
          type: string
          example: https://example.com/photos/submission-1.jpg
        completedat:
          type: string
          format: date-time
          example: 2026-05-01T09:15:00.000Z
    Timesheet:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userid:
          type: integer
          example: 3
        propertyid:
          type: integer
          example: 1
        clockedin:
          type: string
          format: date-time
          example: 2026-05-08T08:00:00.000Z
        clockedout:
          type: string
          format: date-time
          nullable: true
          example: 2026-05-08T16:00:00.000Z
    TimesheetCreate:
      type: object
      required:
        - userid
        - propertyid
        - clockedin
      properties:
        userid:
          type: integer
          example: 3
        propertyid:
          type: integer
          example: 1
        clockedin:
          type: string
          format: date-time
          example: 2026-05-08T08:00:00.000Z
        clockedout:
          type: string
          format: date-time
          nullable: true
          example: 2026-05-08T16:00:00.000Z
    ApiError:
      type: object
      properties:
        error:
          type: string
          example: Resource not found
        details:
          type: array
          items:
            type: string
          example:
            - PropertyID must be a number
  responses:
    BadRequest:
      description: Validation or request error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication failed or missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
