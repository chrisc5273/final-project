      responses:
        '201':
          description: Updated checklist item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a checklist item by id
      tags:
        - Checklist Items
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted checklist item record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/checklist-submissions:
    get:
      summary: List all checklist submissions
      tags:
        - Checklist Submissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of checklist submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChecklistSubmission'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new checklist submission
      tags:
